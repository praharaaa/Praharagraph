<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30 Day Chart Challenge — Bayu Prahara</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Six+Caps&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Hero Section with Header inside -->
  <section class="hero">
    <header class="header">
      <div class="header-container">
        <a href="../" class="header-logo">BAYU PRAHARA</a>
        <nav class="header-nav">
          <a href="../#work" class="nav-link">Work</a>
          <a href="../assets/Bayu-Prahara_Resume_2026.pdf" target="_blank" class="nav-link">Resume</a>
          <a href="mailto:bayuprahara.work@gmail.com" class="nav-link">Contact</a>
        </nav>
      </div>
    </header>

    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-greeting">
        Hello, I'm <span class="hero-name">Bayu</span> and this is my
      </p>
      <h1 class="hero-title">30 DAY CHART CHALLENGE</h1>
      <p class="hero-subtitle">
        One data visualization a day, every day.
      </p>
    </div>
  </section>

<main class="challenge-main">
  <div class="detail-main">
    <div class="detail-container">

      <!-- Intro section -->
      <section class="detail-section challenge-intro">
        <h1 class="detail-title">What is the 30 Day Chart Challenge?</h1>
        <p class="section-text">
          Short English intro about the challenge... (nanti kamu isi).
        </p>
      </section>

      <!-- Weeks & days (JS) -->
      <section class="detail-section challenge-weeks" id="challengeWeeks"></section>

      <!-- Lessons learned -->
      <section class="detail-section challenge-lessons">
        <h2 class="section-title">What I Learned</h2>
        <p class="section-text">
          Refleksi akhir setelah 30 hari... (nanti kamu isi).
        </p>
      </section>

    </div>
  </div>
</main>

  <!-- Data + rendering -->
  <script src="js/data.js"></script>
  <script>
    function renderWeeks() {
      const container = document.getElementById("challengeWeeks");
        container.innerHTML = weeks.map(week => `
        <article class="detail-section week">
            <h2 class="section-title">${week.title}</h2>
            <div class="week-days">
            ${week.days.map(day => `
                <section class="detail-section day">
                <h3 class="section-title">Day ${day.day}: ${day.prompt}</h3>
                <div class="day-chart">
                    ${day.embed}
                </div>
                <p class="section-text day-commentary">${day.commentary}</p>
                </section>
            `).join("")}
            </div>
        </article>
        `).join("");
    }

    renderWeeks();
  </script>

  <!-- Datawrapper resize script (sekaligus untuk semua iframe) -->
  <script>
    window.addEventListener("message", function (a) {
      if (void 0 !== a.data["datawrapper-height"]) {
        var e = document.querySelectorAll("iframe");
        for (var t in a.data["datawrapper-height"])
          for (var r, i = 0; (r = e[i]); i++)
            if (r.contentWindow === a.source) {
              var d = a.data["datawrapper-height"][t] + "px";
              r.style.height = d;
            }
      }
    });
  </script>

</body>
</html>
